<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site_title }}{% endblock %}</title>
<style>
  :root { --ink:#222; --muted:#666; --rule:#ddd; --accent:#5a4632; --bg:#fbfaf7; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Georgia, "Times New Roman", serif; color:var(--ink);
         background:var(--bg); line-height:1.5; }
  a { color:var(--accent); }
  .site-header { border-bottom:2px solid var(--rule); padding:1rem 1.5rem; background:#fff; }
  .site-header .home-link { font-size:1.1rem; font-weight:bold; text-decoration:none; color:var(--ink); }
  main { max-width:52rem; margin:0 auto; padding:1.5rem; }
  h1 { font-size:1.8rem; margin:0 0 .25rem; }
  h2 { font-size:1.3rem; border-bottom:1px solid var(--rule); padding-bottom:.2rem; margin-top:2rem; }
  h3 { font-size:1.05rem; color:var(--muted); margin-top:1.5rem; }
  .ids { color:var(--muted); font-size:.9rem; margin:.25rem 0 1rem; }
  blockquote.citation { border-left:3px solid var(--accent); margin:1rem 0; padding:.5rem 1rem;
                        background:#fff; font-style:italic; }
  dl.meta { display:grid; grid-template-columns:max-content 1fr; gap:.2rem 1rem; margin:1rem 0; }
  dl.meta dt { color:var(--muted); font-weight:bold; }
  dl.meta dd { margin:0; }
  table.claims { border-collapse:collapse; width:100%; font-size:.92rem; margin-top:.5rem; }
  table.claims th, table.claims td { border:1px solid var(--rule); padding:.35rem .5rem;
                                     text-align:left; vertical-align:top; }
  table.claims th { background:#f0ece4; }
  .status { font-size:.78rem; padding:.1rem .4rem; border-radius:.6rem; white-space:nowrap; }
  .status-accepted { background:#d8efd8; color:#1f5a1f; }
  .status-needs-review { background:#fbe6c8; color:#7a5600; }
  .status-suggested { background:#e7e3f5; color:#4b3b78; }
  .status-rejected, .status-superseded { background:#eee; color:#777; text-decoration:line-through; }
  ul.files { list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:1rem; }
  ul.files li { width:10rem; }
  img.thumb { max-width:10rem; max-height:10rem; border:1px solid var(--rule); background:#fff; }
  .note { display:block; color:var(--muted); font-size:.82rem; }
  .summary { background:#fff; border:1px solid var(--rule); border-radius:.3rem;
             padding:.75rem 1rem; margin:1rem 0; }
  .summary dt { font-weight:bold; }
  .photo-strip { display:flex; flex-wrap:wrap; gap:.75rem; }
  .photo-strip figure { margin:0; width:9rem; }
  .photo-strip figcaption { font-size:.78rem; color:var(--muted); }
  .empty { color:var(--muted); font-style:italic; }
  .redacted { color:var(--muted); font-style:italic; }
  mark { background:#ffe0e0; color:#a00; }
  .timeline ul { margin:.25rem 0 1rem; }
  .index-list { columns: 2; }
  .site-footer { max-width:52rem; margin:2rem auto 0; padding:1rem 1.5rem; border-top:1px solid var(--rule);
                 color:var(--muted); font-size:.85rem; }
  /* Interactive tree (vendored renderer, M8.5) */
  .fha-tree { overflow:auto; border:1px solid var(--rule); background:#fff; border-radius:.3rem; padding:.5rem; }
  .fha-tree-svg { display:block; }
  .fha-tree-edge { fill:none; stroke:#bbb; stroke-width:1.5; }
  /* A non-genetic bond (adoptive, step, foster, guardian, ...) drawn distinctly
     from the genetic line (SPEC 12.2). */
  .fha-tree-edge-social { stroke:#c08552; stroke-dasharray:5 3; }
  .fha-node { box-sizing:border-box; width:168px; height:56px; border:1px solid var(--rule);
              border-radius:.3rem; background:#f7f4ee; padding:.25rem .4rem; overflow:hidden;
              font-size:.8rem; line-height:1.15; position:relative; }
  .fha-node-nolink { background:#f0eee9; }
  .fha-name { display:block; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  a.fha-name { color:var(--accent); text-decoration:none; }
  a.fha-name:hover { text-decoration:underline; }
  .fha-dates { display:block; color:var(--muted); }
  .fha-toggle { position:absolute; top:2px; right:2px; width:1.1rem; height:1.1rem; line-height:1;
                border:1px solid var(--rule); border-radius:.2rem; background:#fff; cursor:pointer;
                font-size:.8rem; padding:0; }
  .fha-tree-note { color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>
<header class="site-header">
  <a class="home-link" href="{{ root_prefix }}/index.html">{{ site_title }}</a>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
  <p>{{ footer_note }}</p>
</footer>
</body>
</html>
